#########################################################################
# ⭐⭐⭐  无人机控制参数配置文件（含详细中文注释） ⭐⭐⭐
# 说明：
#   - 本配置对应 PX4 控制逻辑中的分层控制结构：
#       位置环 (Position Loop) → 速度环 (Velocity Loop) → 姿态环 (Attitude Loop)
#   - 当前配置处于“姿态控制模式”（use_bodyrate_ctrl = false）
#   - 因此角速度环（Rate Loop）参数 KAngR/P/Y 不生效
#########################################################################

# ========================== 飞行器物理参数 ==========================
mass        : 1.5     # [kg] 飞行器总质量。影响推力与重力平衡。
gra         : 9.81    # [m/s^2] 重力加速度常数。

# ========================== 姿态解算与仿真设置 ==========================
pose_solver : 0       # 姿态求解器类型：
                      # 0: 使用 ZhepeiWang 的带气动力模型算法（默认，稳定性高）
                      # 1: ZhepeiWang 算法另一版本
                      # 2: 基于旋翼阻力模型求解（rotor-drag）
ctrl_freq_max: 100.0  # [Hz] 控制器最大更新频率（内环频率）。过高会增加仿真负载。

use_bodyrate_ctrl: false   # 是否启用角速度控制模式：
                           # false → 使用姿态角控制（Attitude Control）
                           # true  → 使用角速率控制（Rate Control）

max_manual_vel: 1.0   # [m/s] 手动模式下的最大速度限制。
max_angle: 30          # [deg] 姿态角限制。30° 意味着最大倾斜角不超过30°。
low_voltage: 13.2      # [V] 低电压阈值（对应4S电池，4×3.3V）。

# ========================== 遥控信号反向设置 ==========================
rc_reverse: 
    roll: false        # 横滚通道是否反向
    pitch: false       # 俯仰通道是否反向
    yaw: false         # 偏航通道是否反向
    throttle: false    # 油门通道是否反向

# ========================== 自动起降控制 ==========================
auto_takeoff_land:
    enable: true             # 启用自动起降功能（通过 takeoff_land topic 触发）
    enable_auto_arm: false   # ❌ 关闭自动解锁，改为手动解锁
    no_RC: true              # ✅ 允许无遥控操作（关键！）
    takeoff_height: 1.0     # [m] 自动起飞高度
    takeoff_land_speed: 0.3 # [m/s] 起飞/降落速度

# ========================== 推力模型（Thrust Model） ==========================
# 映射推力指令 u(0~1) → 实际推力 F (N)
# F = K1 * Voltage^K2 * (K3*u^2 + (1-K3)*u)
thrust_model:
    print_value: false        # 是否打印推力标定相关信息
    accurate_thrust_model: false # 是否使用精确推力模型（true则需精确标定电机）
    
    # ---- 精确推力映射参数（若启用 accurate_thrust_model） ----
    K1: 0.7583   # 推力常数（与螺旋桨、电机效率有关）
    K2: 1.6942   # 电压指数项，考虑电压对推力曲线影响
    K3: 0.6786   # 二次项比例，等价于 PX4 的 THR_MDL_FAC 参数

    # ---- 近似模型参数（若关闭 accurate_thrust_model） ----
    hover_percentage: 0.7  # 悬停所需推力比例 (0~1)，用于手动/姿态模式。

# ========================== 控制器增益参数 ==========================
gain: 
    # ===== 外环：位置控制 (Position Loop) =====
    # 控制逻辑：位置误差 → 期望速度
    Kp0: 1.0   # X方向位置比例增益
    Kp1: 1.0   # Y方向位置比例增益
    Kp2: 1.0   # Z方向位置比例增益（Z轴可略高以保持高度）

    # ===== 中环：速度控制 (Velocity Loop) =====
    # 控制逻辑：速度误差 → 期望加速度(姿态目标)
    Kv0: 1.2   # X方向速度比例增益
    Kv1: 1.2   # Y方向速度比例增益
    Kv2: 1.2  # Z方向速度比例增益

    # ===== 速度积分项 (I项) — 当前未启用 =====
    Kvi0: 0.0  # 积分项，补偿慢性偏差（如风偏），一般用于精确悬停
    Kvi1: 0.0
    Kvi2: 0.0

    # ===== 速度微分项 (D项) — 阻尼控制，抑制超调 =====
    Kvd0: 0.20 # X方向速度变化阻尼（相当于PX4中的 D-term）
    Kvd1: 0.20 # Y方向速度变化阻尼
    Kvd2: 0.20 # Z方向速度变化阻尼
               # 适当增大可抑制超调、改善收敛，过大则响应迟钝。

    # ===== 内环：姿态角控制 (Attitude Loop) =====
    # 仅在 use_bodyrate_ctrl = true 时生效！
    KAngR: 20.0  # Roll角比例增益（角速率环）
    KAngP: 20.0  # Pitch角比例增益
    KAngY: 20.0  # Yaw角比例增益

# ========================== 旋翼阻力模型 (Rotor Drag) ==========================
rotor_drag:  
    x: 0.0  # 沿X轴的气动阻力系数 [ (m/s²)/(m/s) ]。
    y: 0.0  # 沿Y轴的阻力系数。
    z: 0.0  # 沿Z轴的阻力系数。
             # 若无人机存在明显前冲/后摆，可适当增加0.1~0.3。
    k_thrust_horz: 0.0  # 水平推力补偿系数，一般保持为0。

# ========================== 通信超时设置 ==========================
msg_timeout:
    odom: 1.0  # [s] 里程计信息超时阈值（放宽至1.0s，避免SITL高负载下误触发failsafe）
    rc:   0.5  # [s] 遥控信号超时阈值
    cmd:  0.5  # [s] 控制指令超时阈值
    imu:  0.5  # [s] IMU传感器超时阈值
    bat:  0.5  # [s] 电池信息超时阈值
